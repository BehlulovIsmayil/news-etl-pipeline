version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: etl_postgres
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
      POSTGRES_DB: ecommerce_dw
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d ecommerce_dw"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Airflow (lightweight standalone mode - no separate worker/scheduler containers)
  airflow:
    image: apache/airflow:2.8.1-python3.11
    container_name: etl_airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://etl_user:etl_pass@postgres:5432/airflow_db
      AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__SECRET_KEY: "supersecret"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: bash -c "airflow db migrate && airflow connections create-default-connections && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true && pip install faker psycopg2-binary sqlalchemy pandas && airflow webserver & airflow scheduler"

volumes:
  postgres_data:
  airflow_logs:
